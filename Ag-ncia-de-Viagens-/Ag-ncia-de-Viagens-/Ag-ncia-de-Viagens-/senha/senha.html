<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Agência de Viagem</title>
    <link rel="stylesheet" href="senha.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <div class="forgot-container">
        <div class="forgot-box">
            <h1 class="logo">
                <i class="fas fa-paper-plane"></i>
                Destino Certo
            </h1>
            <h2>Recuperar Senha</h2>
            <p>
                Insira o seu endereço de e-mail abaixo. Enviaremos um link para você redefinir sua senha.
            </p>

            <form id="forgotPasswordForm">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu-email@exemplo.com" required>
                </div>
                
                <button type="submit" class="send-button">Enviar link de redefinição</button>
            </form>

            
            <p class="back-to-login">
                Lembrou da sua senha? <a href="login.html">Voltar para o login</a>
            </p>
        </div>
    </div>

    <script src="forgot-password.js"></script>
</body>
</html>
